<svg xmlns="http://www.w3.org/2000/svg" width="700" height="235" font-family="Arial, 'Microsoft JhengHei', sans-serif">

  <!-- Title -->
  <text x="350" y="26" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">基數排序法：LSD 與 MSD 比較</text>

  <!-- ── LSD row ── -->
  <rect x="20" y="44" width="72" height="30" fill="#3B82F6" rx="6"/>
  <text x="56" y="64" text-anchor="middle" font-size="14" font-weight="bold" fill="white">LSD</text>
  <text x="102" y="64" font-size="13" fill="#475569">Least Significant Digit — 從個位數開始排</text>

  <!-- LSD boxes: 3(百) 8(十) 4(個, orange) -->
  <rect x="388" y="44" width="38" height="44" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5" rx="4"/>
  <text x="407" y="74" text-anchor="middle" font-size="23" font-weight="bold" fill="#475569">3</text>

  <rect x="428" y="44" width="38" height="44" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5" rx="4"/>
  <text x="447" y="74" text-anchor="middle" font-size="23" font-weight="bold" fill="#475569">8</text>

  <rect x="468" y="44" width="38" height="44" fill="#F97316" stroke="#EA580C" stroke-width="1.5" rx="4"/>
  <text x="487" y="74" text-anchor="middle" font-size="23" font-weight="bold" fill="white">4</text>

  <!-- LSD arrow: to the right of 個位 box -->
  <text x="512" y="70" font-size="13" font-weight="bold" fill="#F97316">← 先比這位</text>

  <!-- LSD digit labels (each centered under its box) -->
  <text x="407" y="101" text-anchor="middle" font-size="12" fill="#64748B">百位</text>
  <text x="447" y="101" text-anchor="middle" font-size="12" fill="#64748B">十位</text>
  <text x="487" y="101" text-anchor="middle" font-size="12" fill="#64748B">個位</text>

  <!-- ── MSD row ── -->
  <rect x="20" y="135" width="72" height="30" fill="#8B5CF6" rx="6"/>
  <text x="56" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="white">MSD</text>
  <text x="102" y="155" font-size="13" fill="#475569">Most Significant Digit — 從百位數開始排</text>

  <!-- MSD boxes: 3(百, purple) 8(十) 4(個) -->
  <rect x="388" y="135" width="38" height="44" fill="#8B5CF6" stroke="#7C3AED" stroke-width="1.5" rx="4"/>
  <text x="407" y="165" text-anchor="middle" font-size="23" font-weight="bold" fill="white">3</text>

  <rect x="428" y="135" width="38" height="44" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5" rx="4"/>
  <text x="447" y="165" text-anchor="middle" font-size="23" font-weight="bold" fill="#475569">8</text>

  <rect x="468" y="135" width="38" height="44" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5" rx="4"/>
  <text x="487" y="165" text-anchor="middle" font-size="23" font-weight="bold" fill="#475569">4</text>

  <!-- MSD digit labels -->
  <text x="407" y="191" text-anchor="middle" font-size="12" fill="#64748B">百位</text>
  <text x="447" y="191" text-anchor="middle" font-size="12" fill="#64748B">十位</text>
  <text x="487" y="191" text-anchor="middle" font-size="12" fill="#64748B">個位</text>

  <!-- MSD arrow: ↑ below 百位 label, clearly pointing up to 百位 box -->
  <text x="407" y="207" text-anchor="middle" font-size="13" font-weight="bold" fill="#8B5CF6">↑ 先比這位</text>

</svg>
